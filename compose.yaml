services:
  postgres:
    image: postgres:17-alpine
    container_name: tutoring-platform-postgres
    environment:
      POSTGRES_DB: tutoring_platform_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tutoring-platform-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tutoring_platform_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tutoring-platform-postgres-data:
